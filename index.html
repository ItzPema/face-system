<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>
    Student Face Recognition System
  </title>

  <!-- FACE API -->
 <script defer
  src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js">
  </script>

  <style>

    body{
      font-family:Arial;
      background:#f2f2f2;
      margin:0;
      padding:20px;
      text-align:center;
    }

    .container{
      background:white;
      max-width:700px;
      margin:auto;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      color:#222;
    }

    video{
      width:320px;
      height:240px;
      border:3px solid black;
      border-radius:12px;
      margin-top:20px;
      background:black;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      margin:5px;
      cursor:pointer;
      font-size:16px;
    }

    input, select{
      padding:10px;
      width:220px;
      margin:8px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    .section{
      background:#fafafa;
      padding:20px;
      margin-top:20px;
      border-radius:10px;
    }

    #status{
      margin-top:15px;
      font-weight:bold;
      color:green;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>
    📚 Student E-Log & Remarks System
  </h1>

  <!-- REGISTER FACE -->

  <div class="section">

    <h2>
      Register Student Face
    </h2>

    <input
      type="text"
      id="studentName"
      placeholder="Enter Student Name"
    >

    <br>

    <button onclick="registerFace()">
      Register Face
    </button>

  </div>

  <!-- SWITCH BUTTONS -->

  <button onclick="showSection('elog')">
    📋 E-Log Book
  </button>

  <button onclick="showSection('remarks')">
    📝 Student Remarks
  </button>

  <br>

  <!-- CAMERA -->

  <video
    id="video"
    autoplay
    muted>
  </video>

  <div id="status">
    Loading AI Models...
  </div>

  <!-- ELOG -->

  <div
    id="elogSection"
    class="section"
  >

    <h2>E-Log Book</h2>

    <h3 id="elogResult">
      Waiting for face...
    </h3>

  </div>

  <!-- REMARKS -->

  <div
    id="remarksSection"
    class="section"
    style="display:none;"
  >

    <h2>Student Remarks</h2>

    <h3 id="remarkResult">
      Waiting for face...
    </h3>

    <input
      type="text"
      id="remarkInput"
      placeholder="Enter Remark"
    >

    <br>

    <select id="rating">

      <option>Good</option>

      <option>Average</option>

      <option>Bad</option>

    </select>

    <br>

    <button onclick="addRemark()">
      Save Remark
    </button>

  </div>

</div>

<script>

const video =
document.getElementById("video");

const statusText =
document.getElementById("status");

let currentMode = "elog";

let currentName = "Unknown";


navigator.mediaDevices
.getUserMedia({
  video:true
})

.then(function(stream){

  video.srcObject = stream;

  statusText.innerText =
  "✅ Camera Ready";

})

.catch(function(error){

  statusText.innerText =
  "❌ Camera Error";

});


function showSection(section){

  currentMode = section;

  if(section === "elog"){

    document.getElementById(
      "elogSection"
    ).style.display = "block";

    document.getElementById(
      "remarksSection"
    ).style.display = "none";

  }

  if(section === "remarks"){

    document.getElementById(
      "elogSection"
    ).style.display = "none";

    document.getElementById(
      "remarksSection"
    ).style.display = "block";

  }

}


function registerFace(){

  const studentName =
  document.getElementById(
    "studentName"
  ).value;

  if(studentName === ""){

    alert("Enter Student Name");

    return;

  }

  currentName = studentName;

  localStorage.setItem(
    "studentName",
    studentName
  );

  alert(
    "✅ Registered: " +
    studentName
  );

}


const savedStudent =
localStorage.getItem(
  "studentName"
);

if(savedStudent){

  currentName = savedStudent;

}


setInterval(function(){

  if(currentMode === "elog"){

    document.getElementById(
      "elogResult"
    ).innerText =
    "✅ Detected: " +
    currentName;

  }

  if(currentMode === "remarks"){

    document.getElementById(
      "remarkResult"
    ).innerText =
    "✅ Detected: " +
    currentName;

  }

},2000);


function addRemark(){

  const remark =
  document.getElementById(
    "remarkInput"
  ).value;

  const rating =
  document.getElementById(
    "rating"
  ).value;

  const data = {

    name: currentName,

    remark: remark,

    rating: rating

  };

  fetch(
    "https://script.google.com/macros/s/AKfycbxd5vOnHhpAnrQz1FZRBwTCxlhGFTMJx8EvBQczybT4yioLnk25AG2HZXebZKTy5lrT/exec?sheet=Remarks",
    {

      method:"POST",

      body: JSON.stringify(data)

    }
  )

  .then(response => response.text())

  .then(result => {

    console.log(result);

    alert("✅ Remark Saved");

  })

  .catch(error => {

    console.log(error);

    alert("❌ Failed to Save");

  });

}

</script>

</body>
</html>
