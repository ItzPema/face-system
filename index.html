<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>
    Student Face Recognition System
  </title>

  <!-- FACE API -->
  <script defer
  src="https://cdn.jsdelivr.net/npm/face-api.js">
  </script>

  <style>

    body{
      font-family:Arial;
      background:#f2f2f2;
      margin:0;
      padding:20px;
      text-align:center;
    }

    .container{
      background:white;
      max-width:700px;
      margin:auto;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      color:#222;
    }

    video{
      width:320px;
      height:240px;
      border:3px solid black;
      border-radius:12px;
      margin-top:20px;
      background:black;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      margin:5px;
      cursor:pointer;
      font-size:16px;
    }

    input, select{
      padding:10px;
      width:220px;
      margin:8px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    .section{
      background:#fafafa;
      padding:20px;
      margin-top:20px;
      border-radius:10px;
    }

    #status{
      margin-top:15px;
      font-weight:bold;
      color:green;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>
    📚 Student E-Log & Remarks System
  </h1>

  <!-- REGISTER FACE -->

  <div class="section">

    <h2>
      Register Student Face
    </h2>

    <input
      type="text"
      id="studentName"
      placeholder="Enter Student Name"
    >

    <br>

    <button onclick="registerFace()">
      Register Face
    </button>

  </div>

  <!-- SWITCH BUTTONS -->

  <button onclick="showSection('elog')">
    📋 E-Log Book
  </button>

  <button onclick="showSection('remarks')">
    📝 Student Remarks
  </button>

  <br>

  <!-- CAMERA -->

  <video
    id="video"
    autoplay
    muted>
  </video>

  <div id="status">
    Loading AI Models...
  </div>

  <!-- ELOG -->

  <div
    id="elogSection"
    class="section"
  >

    <h2>E-Log Book</h2>

    <h3 id="elogResult">
      Waiting for face...
    </h3>

  </div>

  <!-- REMARKS -->

  <div
    id="remarksSection"
    class="section"
    style="display:none;"
  >

    <h2>Student Remarks</h2>

    <h3 id="remarkResult">
      Waiting for face...
    </h3>

    <input
      type="text"
      id="remarkInput"
      placeholder="Enter Remark"
    >

    <br>

    <select id="rating">

      <option>Good</option>

      <option>Average</option>

      <option>Bad</option>

    </select>

    <br>

    <button onclick="addRemark()">
      Save Remark
    </button>

  </div>

</div>

<script>

/* =======================================
   GOOGLE APPS SCRIPT URL
======================================= */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxd5vOnHhpAnrQz1FZRBwTCxlhGFTMJx8EvBQczybT4yioLnk25AG2HZXebZKTy5lrT/exec";


/* =======================================
   VARIABLES
======================================= */

const video =
document.getElementById("video");

const statusText =
document.getElementById("status");

let currentMode = "elog";

let currentName = "";


/* =======================================
   OPEN CAMERA
======================================= */

navigator.mediaDevices
.getUserMedia({
  video:true
})

.then(function(stream){

  video.srcObject = stream;

  statusText.innerText =
  "✅ Camera Started";

})

.catch(function(error){

  statusText.innerText =
  "❌ Camera Access Denied";

  console.log(error);

});


/* =======================================
   LOAD FACE AI MODELS
======================================= */

Promise.all([

  faceapi.nets.tinyFaceDetector.loadFromUri(
    "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/"
  ),

  faceapi.nets.faceLandmark68Net.loadFromUri(
    "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/"
  ),

  faceapi.nets.faceRecognitionNet.loadFromUri(
    "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/"
  )

])

.then(function(){

  statusText.innerText =
  "✅ Face Recognition Ready";

  startDetection();

})

.catch(function(error){

  statusText.innerText =
  "❌ AI Models Failed To Load";

  console.log(error);

});


/* =======================================
   SWITCH PAGE
======================================= */

function showSection(section){

  currentMode = section;

  if(section === "elog"){

    document.getElementById(
      "elogSection"
    ).style.display = "block";

    document.getElementById(
      "remarksSection"
    ).style.display = "none";

  }

  if(section === "remarks"){

    document.getElementById(
      "elogSection"
    ).style.display = "none";

    document.getElementById(
      "remarksSection"
    ).style.display = "block";

  }

}


/* =======================================
   REGISTER FACE
======================================= */

async function registerFace(){

  const studentName =
  document.getElementById(
    "studentName"
  ).value;

  if(studentName === ""){

    alert("Enter Student Name");

    return;

  }

  const detection =
  await faceapi
  .detectSingleFace(
    video,
    new faceapi.TinyFaceDetectorOptions()
  )
  .withFaceLandmarks()
  .withFaceDescriptor();

  if(!detection){

    alert("No Face Detected");

    return;

  }

  const descriptor =
  Array.from(
    detection.descriptor
  );

  localStorage.setItem(

    studentName,

    JSON.stringify(descriptor)

  );

  alert(
    "✅ Face Registered for "
    + studentName
  );

}


/* =======================================
   START FACE DETECTION
======================================= */

async function startDetection(){

  setInterval(async function(){

    const detection =
    await faceapi
    .detectSingleFace(
      video,
      new faceapi.TinyFaceDetectorOptions()
    )
    .withFaceLandmarks()
    .withFaceDescriptor();

    if(detection){

      let recognizedName =
      "Unknown";

      for(
        let i = 0;
        i < localStorage.length;
        i++
      ){

        const savedName =
        localStorage.key(i);

        const savedDescriptor =
        JSON.parse(
          localStorage.getItem(savedName)
        );

        const distance =
        faceapi.euclideanDistance(

          detection.descriptor,

          new Float32Array(
            savedDescriptor
          )

        );

        if(distance < 0.5){

          recognizedName =
          savedName;

        }

      }

      currentName =
      recognizedName;

      /* ==========================
         ELOG
      ========================== */

      if(currentMode === "elog"){

        document.getElementById(
          "elogResult"
        ).innerText =
        "✅ " + recognizedName;

        saveLog(recognizedName);

      }

      /* ==========================
         REMARKS
      ========================== */

      if(currentMode === "remarks"){

        document.getElementById(
          "remarkResult"
        ).innerText =
        "✅ " + recognizedName;

      }

    }

  },3000);

}


/* =======================================
   SAVE LOG
======================================= */

function saveLog(name){

  fetch(
    SCRIPT_URL + "?sheet=Logs",
    {

      method:"POST",

      headers:{
        "Content-Type":
        "application/json"
      },

      body: JSON.stringify({
        name:name
      })

    }
  )

  .then(function(response){

    return response.text();

  })

  .then(function(data){

    console.log(
      "Saved:",
      data
    );

  })

  .catch(function(error){

    console.log(error);

  });

}


/* =======================================
   SAVE REMARK
======================================= */

function addRemark(){

  const remark =
  document.getElementById(
    "remarkInput"
  ).value;

  const rating =
  document.getElementById(
    "rating"
  ).value;

  fetch(
    SCRIPT_URL + "?sheet=Remarks",
    {

      method:"POST",

      headers:{
        "Content-Type":
        "application/json"
      },

      body: JSON.stringify({

        name: currentName,

        remark: remark,

        rating: rating

      })

    }
  )

  .then(function(response){

    return response.text();

  })

  .then(function(data){

    alert("✅ Remark Saved");

    console.log(data);

  })

  .catch(function(error){

    console.log(error);

  });

}

</script>

</body>
</html>
